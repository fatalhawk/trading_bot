name: Daily Alpaca Trade Bot

on:
  schedule:
    - cron: "0 14 * * 1-5"  # Runs at 14:00 UTC = 10:00 AM US Eastern (Mon-Fri)
  workflow_dispatch:       # Optional: manual trigger

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r mean_reversion/requirements.txt

      # - name: Run trade bot for mean_reversion
      #   run: python mean_reversion/main.py

      - name: Run trade bot for pairs trading
        run: python pairs_trading/main.py

      # - name: Commit logs for mean_reversion
      #   run: |
      #     git config user.name "github-actions"
      #     git config user.email "github-actions@github.com"
      #     git add mean_reversion/logs/
      #     git commit -m "Log update - ${{ github.run_id }}" || echo "No changes to commit"
      #     git push

      - name: Commit logs for pairs trading
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pairs_trading/logs/
          git commit -m "Log update - ${{ github.run_id }}" || echo "No changes to commit"
          git push
